name: modify_after_fill
description: Modify of an already-filled order returns CANCEL_REJECT (FIX protocol cancel/replace semantics)
initial_levels:
  - bid_px: 100
    bid_sz: 10
    ask_px: 102
    ask_sz: 40

events:
  - type: submit_order
    order:
      side: Bid
      price: 100
      size: 5
      client_oid: BID_1
      order_type: LIMIT
      tif: GTC
    expected_reports:
      - exec_type: NEW
        order_status: NEW
        client_oid: BID_1
        leaves_qty: 5

  - type: trade
    side: Ask
    price: 100
    size: 20
    expected_reports:
      - exec_type: FILL
        order_status: FILLED
        client_oid: BID_1
        filled_qty: 5
        leaves_qty: 0

  - type: modify_order
    client_oid: BID_1
    new_price: 101
    new_size: 10
    expected_reports:
      - exec_type: CANCEL_REJECT
        order_status: NEW
        client_oid: BID_1
