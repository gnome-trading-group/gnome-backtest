        order_status: REJECTED
        client_oid: IOC_ASK_2

  # ============================================================
  # PHASE 16 — CANCEL_REJECT for post-fill operations
  # BID_01 and ASK_01 were fully filled in Phases 3 and 4.
  # Attempting to modify or cancel them must return CANCEL_REJECT.
