name: ask_full_fill
description: ASK order at 102 with phantom=5, buy trade of 15 fills all 8 lots
initial_levels:
  - bid_px: 100
    bid_sz: 50
    ask_px: 102
    ask_sz: 5

events:
  - type: submit_order
    order:
      side: Ask
      price: 102
      size: 8
      client_oid: ASK_1
      order_type: LIMIT
      tif: GTC
    expected_reports:
      - exec_type: NEW
        order_status: NEW
        client_oid: ASK_1
        leaves_qty: 8

  - type: trade
    side: Bid
    price: 102
    size: 15
    expected_reports:
      - exec_type: FILL
        order_status: FILLED
        client_oid: ASK_1
        filled_qty: 8
        leaves_qty: 0
