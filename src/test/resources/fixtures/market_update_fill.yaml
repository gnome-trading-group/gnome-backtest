name: market_update_fill
description: Local bid rests on empty book; a market update with a crossing ask triggers fill via onMarketUpdate
initial_levels: []

events:
  - type: submit_order
    order:
      side: Bid
      price: 100
      size: 5
      client_oid: BID_1
      order_type: LIMIT
      tif: GTC
    expected_reports:
      - exec_type: NEW
        order_status: NEW
        client_oid: BID_1
        leaves_qty: 5

  - type: market_update
    levels:
      - ask_px: 100
        ask_sz: 20
    expected_reports:
      - exec_type: FILL
        order_status: FILLED
        client_oid: BID_1
        filled_qty: 5
        leaves_qty: 0
