  # ============================================================
  # PHASE 15 — IOC and FOK rejections
  # Neutral book: bid=50/1 ask=200/1 — spread of 150 ensures
  # no IOC/FOK order at reasonable prices can cross.
  # ============================================================

  - type: market_update
    levels:
      - bid_px: 50
        bid_sz: 1
        ask_px: 200
        ask_sz: 1
    expected_reports: []

  - type: submit_order
    order:
