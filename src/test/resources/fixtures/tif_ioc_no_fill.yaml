name: tif_ioc_no_fill
description: IOC limit order with no matching liquidity is immediately rejected
initial_levels: []

events:
  - type: submit_order
    order:
      side: Bid
      price: 100
      size: 10
      client_oid: IOC_1
      order_type: LIMIT
      tif: IOC
    expected_reports:
      - exec_type: REJECT
        order_status: REJECTED
        client_oid: IOC_1
