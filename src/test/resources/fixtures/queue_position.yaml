name: queue_position
description: Two ASK orders at the same level with phantom=5 each. Trade of 15 (5 phantom + 4 + 6) fills both.
initial_levels:
  - bid_px: 100
    bid_sz: 50
    ask_px: 102
    ask_sz: 5

events:
  - type: submit_order
    order:
      side: Ask
      price: 102
      size: 4
      client_oid: ASK_1
      order_type: LIMIT
      tif: GTC
    expected_reports:
      - exec_type: NEW
        order_status: NEW
        client_oid: ASK_1
        leaves_qty: 4

  - type: submit_order
    order:
      side: Ask
      price: 102
      size: 6
      client_oid: ASK_2
      order_type: LIMIT
      tif: GTC
    expected_reports:
      - exec_type: NEW
        order_status: NEW
        client_oid: ASK_2
        leaves_qty: 6

  - type: trade
    side: Bid
    price: 102
    size: 15
    expected_reports:
      - exec_type: FILL
        order_status: FILLED
        client_oid: ASK_1
        filled_qty: 4
        leaves_qty: 0
      - exec_type: FILL
        order_status: FILLED
        client_oid: ASK_2
        filled_qty: 6
        leaves_qty: 0
