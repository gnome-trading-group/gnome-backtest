name: Bump and Deploy
on:
  push:
    branches:
      - 'master'
      - 'main'
    tags:
      - 'v*'

jobs:
  release:
    if: github.ref_type == 'branch'
    uses: gnome-trading-group/gnome-build-tools/.github/workflows/bump-and-deploy.yml@main
    secrets: inherit

  trigger-docker-rebuild:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to gnomepy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: gnome-trading-group/gnomepy
          event-type: gnome-backtest-updated